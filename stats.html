<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats | LOL.Ai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

<style>
  body { 
    background:  #0f0a1d;
    color: #ffffff; 
    font-family: 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
}
</style>
    
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-purple">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">LOL.Ai</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="stats.html">Stats</a></li>
        <li class="nav-item"><a class="nav-link" href="heroes.html">Heroes</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Premium</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">More options</a>
          <ul class="dropdown-menu navbar-purple-drop">
            <li><a class="dropdown-item" href="#">Guide</a></li>
            <li><a class="dropdown-item" href="login.html">Login</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="settings.html">Settings</a></li>
          </ul>
        </li>
      </ul>
      <form class="d-flex" onsubmit="event.preventDefault()">
        <input id="navbarSearch" class="form-control me-2" type="search" placeholder="Search for a champion!">
        <button class="btn search-purple" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>

<div class="container py-5">
    
    <div class="glass-card main-stats-card p-4 mb-4">
        <div class="row align-items-center">
            <div class="col-md-3 text-center">
                <div class="rank-icon-wrapper">
                    <img src="https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/ranked-emblem/emblem-gold.png" alt="Gold Rank" class="img-fluid rank-img">
                </div>
            </div>
            <div class="col-md-5 text-center text-md-start">
                <h1 class="player-name-text">Teodor</h1>
                <p class="text-neon mb-2 fw-bold">Gold II <span class="text-white-opacity">| 78 LP</span></p>
                <div class="d-flex gap-2 justify-content-center justify-content-md-start">
                    <span class="badge bg-purple-soft">EU West</span>
                    <span class="badge bg-purple-soft">Lvl 240</span>
                </div>
            </div>
            <div class="col-md-4 mt-4 mt-md-0">
                <div class="stat-summary-box">
                    <div class="d-flex justify-content-around">
                        <div class="text-center border-end border-secondary pe-3">
                            <small class="text-white-50">Wins</small>
                            <div class="h4 mb-0 text-success">120</div>
                        </div>
                        <div class="text-center border-end border-secondary px-3">
                            <small class="text-white-50">Losses</small>
                            <div class="h4 mb-0 text-danger">100</div>
                        </div>
                        <div class="text-center ps-3">
                            <small class="text-white-50">KDA</small>
                            <div class="h4 mb-0 text-info">3.5</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="glass-card p-4 h-100">
                <h4 class="section-title mb-4"><i class="fas fa-chart-line me-2"></i>Win Rate per Queue</h4>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between mb-1">
                        <span class="fw-bold">Solo/Duo</span>
                        <span class="text-neon">52%</span>
                    </div>
                    <div class="custom-progress-bg">
                        <div class="custom-progress-fill purple-grad" style="width: 52%"></div>
                    </div>
                </div>

                <div class="mb-2">
                    <div class="d-flex justify-content-between mb-1">
                        <span class="fw-bold">Flex Queue</span>
                        <span class="text-blue">55%</span>
                    </div>
                    <div class="custom-progress-bg">
                        <div class="custom-progress-fill blue-grad" style="width: 55%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="glass-card p-4 h-100">
                <h4 class="section-title mb-4"><i class="fas fa-fist-raised me-2"></i>Games per Role</h4>
                <div class="role-chart-container">
                    
                    <div class="role-bar-item">
                        <div class="role-bar-track">
                            <div class="role-bar-fill" style="height: 60%; background: #ff4e50;">
                                <span class="role-val">30</span>
                            </div>
                        </div>
                        <span class="role-label">TOP</span>
                    </div>

                    <div class="role-bar-item">
                        <div class="role-bar-track">
                            <div class="role-bar-fill" style="height: 80%; background: #f9d423;">
                                <span class="role-val">40</span>
                            </div>
                        </div>
                        <span class="role-label">JNG</span>
                    </div>

                    <div class="role-bar-item active-role">
                        <div class="role-bar-track">
                            <div class="role-bar-fill" style="height: 100%; background: #00d2ff;">
                                <span class="role-val">50</span>
                            </div>
                        </div>
                        <span class="role-label">MID</span>
                    </div>

                    <div class="role-bar-item">
                        <div class="role-bar-track">
                            <div class="role-bar-fill" style="height: 70%; background: #4ca1af;">
                                <span class="role-val">35</span>
                            </div>
                        </div>
                        <span class="role-label">ADC</span>
                    </div>

                    <div class="role-bar-item">
                        <div class="role-bar-track">
                            <div class="role-bar-fill" style="height: 50%; background: #e100ff;">
                                <span class="role-val">25</span>
                            </div>
                        </div>
                        <span class="role-label">SUP</span>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
