<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LOL.Ai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<nav class="navbar navbar-expand-lg navbar-purple">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">LOL.Ai</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="stats.html">Stats</a></li>
        <li class="nav-item"><a class="nav-link" href="heroes.html">Heroes</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Premium</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">More options</a>
          <ul class="dropdown-menu navbar-purple-drop">
            <li><a class="dropdown-item" href="#">Guide</a></li>
            <li><a class="dropdown-item active" href="login.html">Login</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="settings.html">Settings</a></li>
          </ul>
        </li>
      </ul>
      <form class="d-flex" onsubmit="event.preventDefault()">
        <input class="form-control me-2" type="search" placeholder="Search for a champion!">
        <button class="btn search-purple" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>

<div class="login-viewport">
    <div class="hero-bg-overlay"></div>
    
    <div class="glass-login-card">
        <div class="login-brand-area text-center">
            <img src="slike/lol-logo.png" alt="LoL Logo" class="login-hero-logo">
            <h2 class="auth-title">WELCOME BACK</h2>
            <p class="auth-subtitle">Login to track your progress</p>
        </div>
        
        <form action="index.html" class="mt-4">
            <div class="custom-input-group mb-3">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" class="custom-field" placeholder="Email Address" required>
            </div>

            <div class="custom-input-group mb-4">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" class="custom-field" placeholder="Password" required>
            </div>

            <button type="submit" class="neon-submit-btn w-100">
                <span>SIGN IN</span>
            </button>
        </form>

        <div class="auth-footer text-center mt-4">
            <p>Don't have an account? <a href="#" class="text-neon">Create one</a></p>
        </div>
    </div>
</div>

<script src="script.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
