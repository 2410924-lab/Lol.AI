<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | LOL.Ai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

<style>
  body { 
    background:  #0f0a1d;
    color: #ffffff; 
    font-family: 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
}
</style>
    
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-purple">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">LOL.Ai</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="stats.html">Stats</a></li>
        <li class="nav-item"><a class="nav-link" href="heroes.html">Heroes</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Premium</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">More options</a>
          <ul class="dropdown-menu navbar-purple-drop">
            <li><a class="dropdown-item" href="#">Guide</a></li>
            <li><a class="dropdown-item" href="login.html">Login</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item active" href="settings.html">Settings</a></li>
          </ul>
        </li>
      </ul>
      <form class="d-flex" onsubmit="event.preventDefault()">
        <input class="form-control me-2" type="search" placeholder="Search for a champion!">
        <button class="btn search-purple" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>

<div class="container py-5 d-flex justify-content-center">
    <div class="settings-ui-card">
        <div class="settings-header">
            <i class="far fa-star"></i>
            <h2 class="mb-0 fw-bold">SETTINGS</h2>
            <a href="stats.html" class="text-white"><i class="fas fa-chevron-left"></i></a>
        </div>

        <div class="settings-content">
            <div class="settings-item">
                <div class="d-flex align-items-center">
                    <i class="fas fa-user-circle me-3 icon-riot"></i>
                    <div>
                        <div class="item-title">Riot Account</div>
                        <div class="item-sub">Connected • EUW</div>
                    </div>
                </div>
            </div>

            <div class="settings-item">
                <div class="d-flex align-items-center justify-content-between w-100">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-moon me-3 icon-yellow"></i>
                        <div class="item-title">Dark Mode</div>
                    </div>
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input custom-switch" type="checkbox" checked>
                    </div>
                </div>
            </div>

            <div class="settings-item">
                <div class="d-flex align-items-center">
                    <i class="fas fa-bell me-3 icon-yellow"></i>
                    <div>
                        <div class="item-title">Weekly Summary</div>
                        <div class="item-sub">Performance overview</div>
                    </div>
                </div>
            </div>

            <div class="settings-item">
                <div class="d-flex align-items-center justify-content-between w-100">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-lock me-3 icon-gray"></i>
                        <div>
                            <div class="item-title">Public Profile</div>
                            <div class="item-sub">Others can view</div>
                        </div>
                    </div>
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input custom-switch" type="checkbox">
                    </div>
                </div>
            </div>

            <a href="login.html" class="settings-item logout-link">
                <div class="d-flex align-items-center">
                    <i class="fas fa-undo-alt me-3"></i>
                    <div class="item-title">Log out</div>
                </div>
            </a>
        </div>
    </div>
</div>

<script src="script.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
