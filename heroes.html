    <a class="navbar-brand" href="#">LOL.Ai</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">

      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="stats.html">Stats</a></li>
        <li class="nav-item"><a class="nav-link" href="heroes.html">Heroes</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Premium</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">More options</a>

            <li><a class="dropdown-item" href="#">Settings</a></li>
          </ul>
        </li>
      </ul>

      <form class="d-flex" onsubmit="searchChampionNavbar(event)">

<!-- Champions Sections -->
<div class="container">

  <!-- Top -->
  <div class="section-title">Top Lane</div>
  <div class="row justify-content-center">
    <div class="col-md-3">
      <div class="champion-card" onclick="location.href='heroes-malphite.html'">
        <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Malphite_0.jpg">
        <div class="champion-name">Malphite</div>
        <div class="champion-role">Tank</div>
      </div>
    </div>
  </div>

  <!-- Jungle -->
  <div class="section-title">Jungle</div>
  <div class="row justify-content-center">
    <div class="col-md-3">
      <div class="champion-card" onclick="location.href='heroes-leesin.html'">
        <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/LeeSin_0.jpg">
        <div class="champion-name">Lee Sin</div>
        <div class="champion-role">Fighter</div>
      </div>
    </div>
  </div>

  <div class="section-title">Mid Lane</div>
  <div class="row justify-content-center">
    <div class="col-md-3">
      <div class="champion-card" onclick="location.href='heroes-ahri.html'">

    <div class="col-md-3">

        <div class="champion-role">Marksman</div>

    </div>

  <div class="section-title">Support</div>
  <div class="row justify-content-center">
    <div class="col-md-3">
      <div class="champion-card" onclick="location.href='heroes-leona.html'">
